<header class="navbar">
  <div class="logo"><a routerLink="/inicio" class="btn-inicio">S.A. UNI</a></div>
  <nav class="nav-links">
    <!-- Enlaza al HomeComponent que ahora es /login -->
    <a routerLink="/login" class="btn-login-outline">Iniciar Sesión</a>
  </nav>
</header>

<div class="registro-container">
  <h2>Registro de Usuario</h2>
  <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" formControlName="usuario" placeholder="Ingrese su usuario">
      <div class="error" *ngIf="registroForm.get('usuario')?.invalid && registroForm.get('usuario')?.touched">
        El usuario es requerido (mínimo 4 caracteres).
      </div>
    </div>

    <div class="form-group">
      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" formControlName="contrasena" placeholder="Ingrese su contraseña">
      <div class="error" *ngIf="registroForm.get('contrasena')?.invalid && registroForm.get('contrasena')?.touched">
        La contraseña es requerida (mínimo 6 caracteres).
      </div>
    </div>

    <div class="form-group">
      <label for="rol">Rol</label>
      <select id="rol" formControlName="rol">
        <option value="" disabled selected>Seleccione un rol</option>
        <option *ngFor="let rol of roles" [value]="rol">{{ rol }}</option>
      </select>
      <div class="error" *ngIf="registroForm.get('rol')?.invalid && registroForm.get('rol')?.touched">
        Debe seleccionar un rol.
      </div>
    </div>

    <button type="submit" [disabled]="registroForm.invalid">Registrarse</button>
  </form>
</div>
