<div class="shell">
  <aside class="sidebar">
    <div class="brand">S.A. UNI · Abasto</div>
    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio del panel</a>
    </nav>
    <div class="user" *ngIf="username">
      <div class="user-name">{{ username }}</div>
      <div class="user-roles" *ngIf="roles.length">{{ roles.join(', ') }}</div>
    </div>
    <button type="button" class="btn-logout" (click)="logout()">Cerrar sesión</button>
  </aside>
  <main class="main">
    <router-outlet />
  </main>
</div>
